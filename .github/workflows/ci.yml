name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (informational — does not block)
        # All current high/critical findings are in transitive dev-dep chains
        # (jest/eslint/googleapis). Production runtime path is not exposed to
        # untrusted XML/template input. Failures here are reported but won't
        # block CI; review periodically and run `npm audit fix` when safe.
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
