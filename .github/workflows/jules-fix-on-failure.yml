# Self-healing flow: Daily scan fails → Jules fixes → auto-merge → re-run scan
# One workflow, full cycle.

name: Jules Fix on Daily Scan Failure

on:
  workflow_run:
    workflows: ['Smart Volume Radar - Daily Scan']
    types: [completed]
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main]

jobs:
  # 1. Daily scan failed → invoke Jules
  invoke-jules:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Get failed run logs
        id: logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed 2>&1 | tail -80 > logs.txt
          echo "log<<LOGS_DELIM" >> $GITHUB_OUTPUT
          cat logs.txt >> $GITHUB_OUTPUT
          echo "LOGS_DELIM" >> $GITHUB_OUTPUT

      - name: Notify Telegram (Jules invoked)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🔧 Jules invoked to fix daily scan failure. Track: ${{ github.event.workflow_run.html_url }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          fi

      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            The Smart Volume Radar daily scan has failed in GitHub Actions.

            **Failed run:** ${{ github.event.workflow_run.html_url }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Repository:** ${{ github.repository }}

            **Failure logs (paste below):**
            ```
            ${{ steps.logs.outputs.log }}
            ```

            Please:
            1. Analyze the failure from the logs above (they contain the actual error output)
            2. Identify the root cause
            3. Implement a minimal fix
            4. Run `npm run lint`, `npm run build`, and `npm run test` to verify
            5. Run `npm version patch -m "fix: resolve daily scan failure"` to bump the version
            6. Push to branch `fix/daily-scan-${{ github.event.workflow_run.run_number }}` and open a PR to main

            Project context (Node.js, TypeScript, ESM):
            - Entry: src/index.ts
            - Config: src/config/, env vars, Google Sheet watchlist
            - Run: `npm run start`; needs FINNHUB_API_KEY, TELEGRAM_*, GOOGLE_SHEET_ID
            - Standards: src/utils/logger (no console.log), escapeHtml for Telegram HTML
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
          include_commit_log: true

  # 2. Jules opened fix/* PR → verify and merge
  verify-and-merge:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.state == 'open' &&
      startsWith(github.event.pull_request.head.ref, 'fix/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash
          echo "✅ PR merged (squash)"

      - name: Re-run daily scan
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-scan.yml',
              ref: 'main'
            });
            core.info('✅ Triggered Smart Volume Radar - Daily Scan');

  # 3. fix/* PR merged manually → re-run (fallback when merge done outside verify-and-merge)
  re-run-scan:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Re-run daily scan
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-scan.yml',
              ref: 'main'
            });
            core.info('✅ Triggered Smart Volume Radar - Daily Scan');
