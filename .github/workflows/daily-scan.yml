name: Smart Volume Radar - Daily Scan

concurrency:
  group: daily-scan
  cancel-in-progress: false

on:
  schedule:
    # Run at 4:30 PM EST / 5:30 PM EDT (ensures market is closed in both timezones)
    # UTC conversion: 16:30 EST = 21:30 UTC, 17:30 EDT = 21:30 UTC
    # Market closes at 4:00 PM ET (21:00 UTC EST, 20:00 UTC EDT)
    # Using 21:30 UTC ensures market is closed in both EST and EDT periods
    # Only Monday to Friday
    - cron: '30 21 * * 1-5'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to commit .jules-last-issues.json for dedup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Smart Volume Radar
        id: scan
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_LLM_SUMMARY: 'true'
          LLM_PROVIDER: 'gemini'
          MIN_RVOL: '2.0'
          FORCE_SCAN: 'true'
        run: npm run start

      - name: Set artifact name
        id: artifact
        run: echo "name=scan-$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload scan results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: results/
          retention-days: 90

      - name: Report success
        if: success() && !hashFiles('.scan-issues.json')
        run: echo "✅ Smart Volume Radar completed successfully"

      - name: Get run issues for Jules
        if: success() && hashFiles('.scan-issues.json') != ''
        id: issues
        run: |
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z0-9')
          echo "content<<${DELIMITER}" >> $GITHUB_OUTPUT
          cat .scan-issues.json >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Notify Telegram (Jules invoked for run issues)
        if: success() && hashFiles('.scan-issues.json') != ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🔧 Run issues detected (invalid tickers / fetch failures). Jules invoked to fix. Check GitHub Actions."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          fi

      - name: Invoke Jules to fix run issues
        if: success() && hashFiles('.scan-issues.json') != ''
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            The Smart Volume Radar daily scan completed successfully but reported RUN ISSUES.

            **Run issues (.scan-issues.json):**
            ```
            ${{ steps.issues.outputs.content }}
            ```

            Issues include:
            - **Invalid ticker format (skipped):** Symbols that don't match TICKER_REGEX in src/config/index.ts (e.g. 000660.KS, 8035.T, BA.L). Either extend the regex to support them or recommend removing from the Google Sheet.
            - **Failed to fetch:** Tickers that returned no data from Yahoo/Twelve Data. May need fallback logic or documentation.

            Please:
            1. Analyze the issues from the JSON above
            2. Implement a minimal fix (extend ticker validation if appropriate, or improve fetch handling)
            3. Run npm run lint, npm run build, npm run test
            4. Run npm version patch -m "fix: resolve run issues (invalid tickers / fetch failures)"
            5. Push to branch fix/daily-scan-run-issues-${{ github.run_number }} and open a PR to main

            Project context:
            - Entry: src/index.ts | Config: src/config/ | Ticker validation: validateTicker, TICKER_REGEX
            - Standards: docs/standards-for-ci.md
            - PR body: Include summary — what changed, why, how to verify.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: true
          include_commit_log: true

      - name: Persist Jules issues for dedup (one fix attempt)
        if: success() && hashFiles('.scan-issues.json') != '' && hashFiles('.jules-last-issues.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .jules-last-issues.json
          git diff --staged --quiet || git commit -m "chore: persist Jules issues for dedup"
          git push || echo "Push skipped (may already be up to date)"
      
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=❌ Smart Volume Radar failed. Jules will attempt an auto-fix. Check GitHub Actions."
          else
            echo "⚠️ Telegram secrets not set, skipping notification"
          fi
