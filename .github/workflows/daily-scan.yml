name: Smart Volume Radar - Daily Scan

concurrency:
  group: daily-scan
  cancel-in-progress: false

on:
  schedule:
    # Run at 4:30 PM EST / 5:30 PM EDT (ensures market is closed in both timezones)
    # UTC conversion: 16:30 EST = 21:30 UTC, 17:30 EDT = 21:30 UTC
    # Market closes at 4:00 PM ET (21:00 UTC EST, 20:00 UTC EDT)
    # Using 21:30 UTC ensures market is closed in both EST and EDT periods
    # Only Monday to Friday
    - cron: '30 21 * * 1-5'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Smart Volume Radar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENABLE_LLM_SUMMARY: 'true'
          LLM_PROVIDER: 'gemini'
          MIN_RVOL: '2.0'
          FORCE_SCAN: 'true'
        run: npm run start
      
      - name: Report success
        if: success()
        run: echo "✅ Smart Volume Radar completed successfully"
      
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=❌ Smart Volume Radar failed. Jules will attempt an auto-fix. Check GitHub Actions."
          else
            echo "⚠️ Telegram secrets not set, skipping notification"
          fi
