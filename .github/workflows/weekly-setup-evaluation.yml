name: Weekly Setup Evaluation

on:
  schedule:
    # Saturday 10:00 UTC (6 = Saturday in cron) — weekly summary after Friday's close
    - cron: '0 10 * * 6'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write  # Jules needs to push branch for PR
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download scan artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p results
          for run in $(gh run list --workflow daily-scan.yml --limit 35 --json databaseId,conclusion -q '.[] | select(.conclusion=="success") | .databaseId'); do
            gh run download "$run" -D results || true
          done

      - name: Run evaluation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: npm run evaluate-setups-30d > eval_output.txt 2>&1 || true

      - name: Validate scan logs (replay vs actual)
        id: validate
        continue-on-error: true
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          MIN_RVOL: '2.0'
        run: npm run validate-scan 2>&1 | tee validate_output.txt

      - name: Get validation report for Jules
        id: report
        if: steps.validate.outcome == 'failure'
        run: |
          echo "content<<REPORT_EOF" >> $GITHUB_OUTPUT
          cat .scan-validation-report.json 2>/dev/null || echo "{}" >> $GITHUB_OUTPUT
          echo "REPORT_EOF" >> $GITHUB_OUTPUT

      - name: Invoke Jules on validation failure
        if: steps.validate.outcome == 'failure'
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            Smart Volume Radar scan validation FAILED. Replay (production code on historical data) found stocks that should have appeared in the actual scan but did not, and they were NOT in failedTickers — suggesting a potential bug.

            **Validation report:**
            ```
            ${{ steps.report.outputs.content }}
            ```

            **Validate output (validate_output.txt):** See job logs.

            Please:
            1. Analyze the report (unexplained misses, failedTickers)
            2. Investigate why these stocks were missed — check rvolCalculator, marketData, filtering logic
            3. Implement a minimal fix if you identify a bug
            4. Run npm run lint, npm run build, npm run test
            5. Open PR titled "fix: resolve scan validation — unexplained misses [date]"

            Context: docs/investigation-nbis-march-11.md, docs/standards-for-ci.md
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: true

      - name: Send to Telegram
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            if [ -f eval_output.txt ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text@eval_output.txt"
            else
              echo "No eval_output.txt — evaluation may have failed before producing output"
            fi
          fi
