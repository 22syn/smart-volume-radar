# Label Jules PRs for observability
name: Jules PR Labels

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  label-jules-pr:
    if: |
      startsWith(github.event.pull_request.head.ref, 'fix/daily-scan') ||
      startsWith(github.event.pull_request.head.ref, 'chore/standards')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add Jules labels
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const labels = ['jules'];
            if (headRef.startsWith('fix/daily-scan')) labels.push('jules/fix-daily');
            else if (headRef.startsWith('chore/standards')) labels.push('jules/standards');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
            core.info('Added labels: ' + labels.join(', '));
